<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Help Desk - AI Chat Agent</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --chat-bg: #ffffff;
            --primary-color: #1a73e8;
            --user-msg: #e8f0fe;
            --agent-msg: #f1f3f4;
            --text-color: #3c4043;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 80vh;
            background: var(--chat-bg);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: var(--primary-color);
            color: white;
            padding: 15px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .status-indicator {
            font-size: 0.8rem;
            background: #34a853;
            padding: 4px 8px;
            border-radius: 12px;
            color: white;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.user {
            background-color: var(--user-msg);
            align-self: flex-end;
            color: #155724;
            border-bottom-right-radius: 2px;
        }

        .message.agent {
            background-color: var(--agent-msg);
            align-self: flex-start;
            color: var(--text-color);
            border-bottom-left-radius: 2px;
        }

        .message.system {
            background-color: #fef7e0;
            color: #b06000;
            align-self: center;
            font-size: 0.85rem;
            text-align: center;
            max-width: 90%;
        }

        .chat-input-area {
            display: flex;
            padding: 15px;
            border-top: 1px solid #e0e0e0;
            background: #fafafa;
            gap: 10px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input-area input:focus {
            border-color: var(--primary-color);
        }

        .chat-input-area button {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .chat-input-area button:hover {
            background: #1557b0;
        }

        .chat-input-area button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <span>NovaDesk: IT Help Desk Agent</span>
            <span class="status-indicator" id="statusLabel">Connected</span>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="message agent">Hello! I am NovaDesk, your automated IT support assistant. How can I help resolve your system or hardware issues today?</div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Type your technical problem details here..." autocomplete="off">
            <button id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusLabel = document.getElementById('statusLabel');

        // Allow pressing Enter key to trigger send button
        userInput.addEventListener("keyup", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                sendBtn.click();
            }
        });

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // 1. Display user message immediately in UI
            appendMessage(text, 'user');
            userInput.value = ''; // Clear input field
            
            // Set sending UI states
            setLoadingState(true);

            try {
                // 2. Perform Fetch Request to Flask App Engine Backend
                // Note: We use the exact schema keys matching your Flask backend requirements
               const response = await fetch('http://127.0.0.1:8000/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        message: text 
                    })
                });

                if (!response.ok) {
                    throw new Error(`Server returned HTTP status ${response.status}`);
                }

                const data = await response.json();
                
                // 3. Render the output coming from your main_agent response context
                if (data && data.response) {
                    appendMessage(data.response, 'agent');
                } else if (data && data.reply) {
                    appendMessage(data.reply, 'agent');
                } else {
                    // Fallback to match primitive text string returns
                    appendMessage(JSON.stringify(data), 'agent');
                }

            } catch (error) {
                console.error("Communication error with backend agent:", error);
                appendMessage("System Alert: Connection failed to reach the AI Agent backend. Make sure your Flask local development server is active.", 'system');
            } finally {
                setLoadingState(false);
            }
        }

        function appendMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender);
            msgDiv.textContent = text;
            chatMessages.appendChild(msgDiv);
            
            // Ensure container auto-scrolls down to show recent text records
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function setLoadingState(isLoading) {
            if (isLoading) {
                sendBtn.disabled = true;
                sendBtn.textContent = "Processing...";
                statusLabel.textContent = "AI is thinking...";
                statusLabel.style.background = "#f4b400";
            } else {
                sendBtn.disabled = false;
                sendBtn.textContent = "Send";
                statusLabel.textContent = "Connected";
                statusLabel.style.background = "#34a853";
            }
        }
    </script>
</body>
</html>
